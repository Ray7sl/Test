name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  check-source-branch:
    name: Check Source Branch
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - name: Only allow PR from dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ PR to main must come from dev branch!"
            echo "   Current source: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Source branch is dev, proceeding."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Jtest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
